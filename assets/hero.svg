<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Awesome AI Devtools ecosystem map</title>
  <desc id="desc">A polished storefront-style map of AI developer tool shelves, connected nodes, and developer workflow surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="0.48" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#fff2ea"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.68"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#25312f" flood-opacity="0.14"/>
    </filter>
    <style>
      .ink{fill:#172321}
      .muted{fill:#5d6b66}
      .line{stroke:#d8ddd7;stroke-width:2}
      .teal{fill:#1c8a7a}
      .coral{fill:#e46f55}
      .gold{fill:#e4a93a}
      .blue{fill:#4d77b8}
      .panel{fill:url(#glass);stroke:#e2e7df;stroke-width:1.5}
      .small{font:500 18px Inter,Segoe UI,Arial,sans-serif}
      .label{font:700 20px Inter,Segoe UI,Arial,sans-serif}
      .title{font:800 52px Inter,Segoe UI,Arial,sans-serif;letter-spacing:0}
      .mono{font:600 15px ui-monospace,SFMono-Regular,Consolas,monospace}
    </style>
  </defs>

  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>
  <path d="M80 342 C245 260, 334 358, 486 287 S730 197, 870 273 S1025 350, 1120 265" fill="none" stroke="#dce6df" stroke-width="3"/>
  <path d="M74 112 H1126" stroke="#ece1d6" stroke-width="2"/>
  <path d="M74 330 H1126" stroke="#dfe8e4" stroke-width="2"/>

  <g transform="translate(78 76)">
    <text class="title ink" x="0" y="0">AI Devtools</text>
    <text class="title ink" x="0" y="58">Ecosystem Map</text>
    <text class="small muted" x="3" y="104">Structured metadata, generated shelves, validation-backed discovery.</text>
    <g transform="translate(2 137)">
      <rect width="138" height="38" rx="19" fill="#172321"/>
      <text class="mono" x="22" y="25" fill="#fff">tool map</text>
      <rect x="152" width="166" height="38" rx="19" fill="#ffffff" stroke="#d9ded7"/>
      <text class="mono muted" x="174" y="25">live shelves</text>
      <rect x="332" width="204" height="38" rx="19" fill="#ffffff" stroke="#d9ded7"/>
      <text class="mono muted" x="354" y="25">metadata-first</text>
    </g>
  </g>

  <g transform="translate(690 54)" filter="url(#shadow)">
    <rect class="panel" width="390" height="320" rx="24"/>
    <rect x="26" y="28" width="338" height="52" rx="14" fill="#172321"/>
    <circle cx="54" cy="54" r="9" class="coral"/>
    <circle cx="82" cy="54" r="9" class="gold"/>
    <circle cx="110" cy="54" r="9" class="teal"/>
    <text x="142" y="61" fill="#ffffff" class="mono">generated README</text>

    <g transform="translate(28 105)">
      <rect width="150" height="52" rx="14" fill="#f4fbf9" stroke="#cfe2dc"/>
      <rect y="70" width="150" height="52" rx="14" fill="#fff7ed" stroke="#edd8bd"/>
      <rect y="140" width="150" height="52" rx="14" fill="#f5f7ff" stroke="#d6ddf1"/>
      <text class="label ink" x="20" y="33">Agents</text>
      <text class="label ink" x="20" y="103">IDE</text>
      <text class="label ink" x="20" y="173">MCP</text>
    </g>

    <g transform="translate(212 108)">
      <rect width="124" height="22" rx="11" class="teal"/>
      <rect y="37" width="96" height="22" rx="11" fill="#a9d9d0"/>
      <rect y="74" width="124" height="22" rx="11" class="coral"/>
      <rect y="111" width="78" height="22" rx="11" fill="#f4c681"/>
      <rect y="148" width="118" height="22" rx="11" class="blue"/>
    </g>
  </g>

  <!-- <g transform="translate(552 224)">
    <circle cx="0" cy="0" r="8" class="teal"/>
    <circle cx="74" cy="-54" r="8" class="gold"/>
    <circle cx="132" cy="18" r="8" class="coral"/>
    <circle cx="216" cy="-24" r="8" class="blue"/>
    <path d="M8 -6 L66 -48 M82 -48 L124 12 M140 14 L208 -20" fill="none" stroke="#8bb8ad" stroke-width="3" stroke-linecap="round"/>
  </g> -->

  <g transform="translate(88 318)">
    <rect width="178" height="46" rx="14" fill="#ffffff" stroke="#d9ded7"/>
    <text class="mono muted" x="20" y="29">coding agents</text>
    <rect x="194" width="154" height="46" rx="14" fill="#ffffff" stroke="#d9ded7"/>
    <text class="mono muted" x="214" y="29">code review</text>
    <rect x="364" width="128" height="46" rx="14" fill="#ffffff" stroke="#d9ded7"/>
    <text class="mono muted" x="386" y="29">evals</text>
  </g>
</svg>
